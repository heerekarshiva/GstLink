{% extends "base.html" %}
{% block title %}Change Password – GSTLink{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="page-header mb-4">
        <h4 class="page-title"><i class="bi bi-shield-lock me-2" style="color:var(--teal)"></i>Change Password</h4>
      </div>
      <div class="card p-4">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Current Password *</label>
            <input type="password" name="current_password" class="form-control" required autofocus>
          </div>
          <hr class="my-3">
          <div class="mb-3">
            <label class="form-label">New Password *</label>
            <input type="password" name="new_password" class="form-control"
                   placeholder="Min 8 characters" required minlength="8">
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm New Password *</label>
            <input type="password" name="confirm_password" class="form-control"
                   placeholder="Repeat new password" required minlength="8">
          </div>
          <div class="d-flex gap-2">
            <a href="{{ url_for('profile') }}" class="btn btn-outline-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary flex-fill">
              <i class="bi bi-shield-check me-2"></i>Change Password
            </button>
          </div>
        </form>
        <div class="mt-3 p-3 rounded" style="background:#fff8f0;border:1px solid #ffd09b;">
          <p class="small mb-0 text-muted">
            <i class="bi bi-info-circle me-1"></i>
            You will receive a security notification email after changing your password.
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
