{% extends "base.html" %}
{% block title %}Forgot Password – GSTLink{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5" style="background:linear-gradient(135deg,#f0faf9,#e8f5f3)">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
          <a href="{{ url_for('landing') }}" class="text-decoration-none">
            <div class="d-inline-flex align-items-center gap-2">
              <div class="brand-icon" style="width:40px;height:40px;font-size:20px;">G</div>
              <span class="brand-text fs-4">GST<span class="brand-accent">Link</span></span>
            </div>
          </a>
        </div>
        <div class="card border-0 shadow-lg p-4">
          <h4 class="fw-800 mb-1">Reset your password</h4>
          <p class="text-muted small mb-4">Enter your email and we'll send a reset link valid for 1 hour.</p>
          <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
              <label class="form-label">Email Address *</label>
              <input type="email" name="email" class="form-control form-control-lg"
                     placeholder="you@example.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
              <i class="bi bi-send me-2"></i>Send Reset Link
            </button>
          </form>
          <div class="text-center mt-3">
            <span class="text-muted small">
              Remember it? <a href="{{ url_for('login') }}" class="fw-600" style="color:var(--teal)">Back to Login</a>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
