{% extends "base.html" %}
{% block title %}Add Client – GSTLink{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="page-header">
        <h4 class="page-title"><i class="bi bi-person-plus me-2" style="color:var(--teal)"></i>Add New Client</h4>
      </div>
      <div class="card p-4">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Client / Company Name *</label>
            <input type="text" name="client_name" class="form-control" placeholder="Acme Corp Pvt Ltd" required>
          </div>
          <div class="mb-3">
            <label class="form-label">GSTIN <span class="text-muted">(optional)</span></label>
            <input type="text" name="client_gstin" class="form-control mono" placeholder="27AADCA1234F1Z5" maxlength="15" style="text-transform:uppercase">
            <div class="form-text">State will be auto-detected from GSTIN</div>
          </div>
          <div class="mb-3">
            <label class="form-label">State</label>
            <select name="state" class="form-select">
              <option value="">— Select State —</option>
              {% for state in states %}
              <option value="{{ state }}">{{ state }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" placeholder="billing@acme.com">
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="tel" name="phone" class="form-control" placeholder="+91 98765 43210">
            </div>
          </div>
          <div class="mb-4 mt-3">
            <label class="form-label">Address</label>
            <textarea name="address" class="form-control" rows="2" placeholder="Office address"></textarea>
          </div>
          <div class="d-flex gap-3">
            <button type="submit" class="btn btn-primary flex-fill">Add Client</button>
            <a href="{{ url_for('clients') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
